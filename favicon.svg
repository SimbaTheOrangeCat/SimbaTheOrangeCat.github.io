<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Warm terracotta rounded square background -->
  <rect width="32" height="32" rx="8" fill="#CD9575"/>
  <!-- Subtle inner glow -->
  <rect width="32" height="32" rx="8" fill="url(#g)" opacity="0.35"/>
  <defs>
    <radialGradient id="g" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#CD9575"/>
    </radialGradient>
  </defs>
  <!-- Serif M drawn as paths for crisp rendering at all sizes -->
  <!-- Left leg -->
  <rect x="6" y="9" width="3" height="14" rx="1" fill="white"/>
  <!-- Right leg -->
  <rect x="23" y="9" width="3" height="14" rx="1" fill="white"/>
  <!-- Left diagonal (M peak going down-right) -->
  <polygon points="6,9 9,9 16,18 13,18" fill="white"/>
  <!-- Right diagonal (M peak going down-left) -->
  <polygon points="23,9 26,9 19,18 16,18" fill="white"/>
  <!-- Small dot accent — the "mindful" period -->
  <circle cx="16" cy="26.5" r="1.8" fill="rgba(255,255,255,0.75)"/>
</svg>
