<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark navy rounded square — matches the night sky theme -->
  <rect width="32" height="32" rx="7" fill="#0d1b3e"/>

  <!-- Subtle inner highlight so it doesn't look flat -->
  <rect width="32" height="32" rx="7" fill="url(#sky-glow)" opacity="0.25"/>

  <defs>
    <radialGradient id="sky-glow" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </radialGradient>
  </defs>

  <!-- Flowing M — same design as logo-nav.svg, scaled to fit 32×32 -->
  <path
    d="M 4 24
       C 4 24  4  9 9.5  9
       C 15   9 13 19 16 19
       C 19  19 17  9 22.5  9
       C 28   9 28 24 28 24"
    stroke="white"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
