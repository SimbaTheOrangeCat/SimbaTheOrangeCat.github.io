<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="paper_texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#FDFBF9" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
    </filter>
  </defs>

  <!-- Background with subtle texture -->
  <rect width="1000" height="1000" fill="#FDFBF9"/>
  <rect width="1000" height="1000" filter="url(#paper_texture)" opacity="0.3"/>

  <!-- Quote Lines -->
  <g font-family="Georgia, serif" font-size="42" fill="#3D3A37" text-anchor="middle">
    <text x="500" y="420" opacity="0">
      "Not every morning needs a sprint."
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="12s" repeatCount="indefinite" begin="0s" keyTimes="0;0.1;0.2;0.4;0.5;1" />
    </text>
    <text x="500" y="500" opacity="0">
      "A slow start is not laziness."
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="12s" repeatCount="indefinite" begin="4s" keyTimes="0;0.1;0.2;0.4;0.5;1" />
    </text>
    <text x="500" y="580" opacity="0">
      "It is a reset."
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="12s" repeatCount="indefinite" begin="8s" keyTimes="0;0.1;0.2;0.4;0.5;1" />
    </text>
  </g>

  <!-- Signature -->
  <text x="500" y="850" font-family="Inter, sans-serif" font-size="18" font-weight="500" letter-spacing="2" fill="#8A4A33" text-anchor="middle" opacity="0.6">
    MINDFACTOR
  </text>
</svg>
