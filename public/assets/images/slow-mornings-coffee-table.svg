<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="600" y1="0" x2="600" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDFBF9"/>
      <stop offset="1" stop-color="#F5F0EB"/>
    </linearGradient>
    <filter id="soft_steam">
      <feGaussianBlur stdDeviation="6" result="blur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="url(#bg_grad)"/>

  <!-- Morning Window Light -->
  <rect x="100" y="50" width="400" height="400" fill="#FFECB3" opacity="0.15" transform="rotate(-15 100 50)"/>

  <!-- Table -->
  <rect x="120" y="500" width="960" height="200" rx="18" fill="#D8C1A7"/>
  <rect x="150" y="550" width="900" height="80" rx="14" fill="#C9AE91"/>

  <!-- Person (Subtle silhouette/presence) -->
  <path d="M500 400C500 350 550 320 600 320C650 320 700 350 700 400V500H500V400Z" fill="#E8D6BF" opacity="0.4"/>

  <!-- Coffee Cup -->
  <g transform="translate(750, 430)">
    <rect width="60" height="50" rx="6" fill="#FDFBF9" stroke="#D3B89A" stroke-width="2"/>
    <path d="M60 10C70 10 78 18 78 25C78 32 70 40 60 40" stroke="#D3B89A" stroke-width="4"/>
    
    <!-- Animation 4: Steam Rising Gently -->
    <path d="M20 -10C15 -25 25 -35 20 -50" stroke="#D3B89A" stroke-width="3" opacity="0" filter="url(#soft_steam)">
      <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="d" values="M20 -10C15 -25 25 -35 20 -50; M25 -10C20 -25 30 -35 25 -50" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M40 -15C35 -30 45 -40 40 -55" stroke="#D3B89A" stroke-width="3" opacity="0" filter="url(#soft_steam)">
      <animate attributeName="opacity" values="0;0.3;0" dur="4.5s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="d" values="M40 -15C35 -30 45 -40 40 -55; M45 -15C40 -30 50 -40 45 -55" dur="4.5s" begin="1s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- No phone, no laptop — just stillness -->
  <rect x="250" y="470" width="120" height="10" rx="5" fill="#D3B89A" opacity="0.3"/>
</svg>
