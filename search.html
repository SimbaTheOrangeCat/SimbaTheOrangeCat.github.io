<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Mindfactor's Personal Blog</title>
    <meta name="description" content="Search the blog.">
    <!-- Google Fonts: Lora (serif for coziness) and Inter (sans-serif for clean UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/styles/global.css">

    <style>
        .search-header {
            margin-bottom: 48px;
            text-align: center;
        }

        .search-title {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .search-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 0 auto 48px;
            display: flex;
            justify-content: center;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            font-size: 1.1rem;
            font-family: var(--font-sans);
            outline: none;
            transition: var(--transition-smooth);
            background-color: var(--surface-color);
            color: var(--text-primary);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px rgba(205, 149, 117, 0.1);
        }

        /* Post List */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .list-item {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 40px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item .post-title {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
    </style>

</head>

<body>
    <div class="reading-progress-container">
        <div class="reading-progress-bar" id="reading-progress-bar"></div>
    </div>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Mindfactor.</a>
            <div class="nav-right">
                <nav class="main-nav">
                    <a href="index.html">Home</a>
                    <a href="blog.html">Blog</a>
                    <a href="about.html">About</a>
                    <a href="search.html">Search</a>
                    <a href="journal.html" class="nav-journal-btn">My Journal</a>
                </nav>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <main class="main-content">

        <div class="container">
            <div class="search-header fade-up">
                <h1 class="search-title">Search</h1>
                <p class="search-subtitle">Find articles by keywords or categories.</p>
            </div>

            <div class="search-container fade-up">
                <input type="text" id="search-input" class="search-input" placeholder="Type to search..."
                    autocomplete="off">
            </div>

            <!-- Blog Posts Results -->
            <div class="post-list" id="search-results">
                <!-- Results will be injected here via JavaScript -->
            </div>
        </div>

        <script>
            const posts = [
                {
                    title: "Finding Warmth in the Minimalist Lifestyle",
                    url: "warmth-in-minimalism.html",
                    category: "Lifestyle",
                    read_time: "4 min read",
                    date: "Oct 12, 2026",
                    excerpt: "Minimalism does not mean cold, empty spaces. It is about creating room for what truly matters, wrapped in warmth.",
                },
                {
                    title: "A Guide to Cozy Productivity",
                    url: "cozy-productivity.html",
                    category: "Productivity",
                    read_time: "6 min read",
                    date: "Nov 01, 2026",
                    excerpt: "How to embrace soft focus and ambient environments to boost your creative output without burnout.",
                },
                {
                    title: "The Art of Slow Living",
                    url: "art-of-slow-living.html",
                    category: "Mindfulness",
                    read_time: "5 min read",
                    date: "Nov 15, 2026",
                    excerpt: "Slowing down in a fast-paced world brings clarity and tranquility to our daily routines.",
                },
                {
                    title: "Art of Mindful Breathing",
                    url: "art-of-mindful-breathing.html",
                    category: "Mindfulness",
                    read_time: "3 min read",
                    date: "Mar 27, 2026",
                    excerpt: "Ever felt the world around you is too much intimidating? No matter what you do, what you think, it is always scary.",
                }
            ];

            const searchInput = document.getElementById('search-input');
            const resultsContainer = document.getElementById('search-results');

            function renderPosts(filteredPosts) {
                if (filteredPosts.length === 0) {
                    resultsContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary); font-size: 1.1rem; padding: 40px 0;">No posts found matching your search. Try different keywords.</p>';
                    return;
                }

                resultsContainer.innerHTML = filteredPosts.map(post => `
        <article class="list-item" style="animation: fadeIn 0.4s ease-out;">
            <div class="meta-tags">
                <span class="category-tag">${post.category}</span>
                <span class="read-time">${post.read_time}</span>
                <span style="color: var(--border-color); margin-left: 16px;">&bull;</span>
                <span style="margin-left: 16px;">${post.date}</span>
            </div>
            <a href="${post.url}">
                <h2 class="post-title">${post.title}</h2>
            </a>
            <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 1.1rem;">${post.excerpt}</p>
            <a href="${post.url}" style="color: var(--accent-color); font-weight: 500;">Read post &rarr;</a>
        </article>
    `).join('');
            }

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (!query) {
                    renderPosts(posts); // Show all when empty or could be empty depending on preference, showing all is nicer.
                    return;
                }
                const filtered = posts.filter(post =>
                    post.title.toLowerCase().includes(query) ||
                    post.excerpt.toLowerCase().includes(query) ||
                    post.category.toLowerCase().includes(query)
                );
                renderPosts(filtered);
            });

            // Initial render
            renderPosts(posts);
        </script>

    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; 2026 Mindfactor. Designed with warmth.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/scripts/supabase-config.js"></script>
    <script src="assets/scripts/auth.js"></script>
    <script src="assets/scripts/features.js"></script>
    <script src="assets/scripts/main.js"></script>

</body>

</html>
